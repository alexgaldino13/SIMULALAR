    {% if not has_premium %}
        <!-- Placeholder para AdMob / AdSense -->
        <span class="text-muted small"><i class="fas fa-ad me-1"></i> Espaço Publicitário</span>

        Para produção, insira seu script do Google AdSense aqui:
        <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXXXXX" crossorigin="anonymous"></script>
        <ins class="adsbygoogle"
             style="display:block"
             data-ad-client="ca-pub-XXXXXXXXXXXXXXXX"
             data-ad-slot="YYYYYYYYYY"
             data-ad-format="auto"
             data-full-width-responsive="true"></ins>
        <script>
             (adsbygoogle = window.adsbygoogle || []).push({});
        </script>
        -->

        <span class="text-success small"><i class="fas fa-star me-1"></i> Experiência Premium (Sem Anúncios)</span>
    {% endif %}
</div>
