{% extends "base.html" %}
{% load i18n %}

{% block head_title %}Recuperar Senha{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-sm border-0 mt-5">
            <div class="card-body p-4">
                <div class="text-center mb-4">
                    <i class="fas fa-lock fa-3x text-primary mb-3"></i>
                    <h2 class="fw-bold">Esqueceu a senha?</h2>
                    <p class="text-muted">Digite seu e-mail abaixo e enviaremos um link para você redefinir sua senha.</p>
                </div>

                <form method="post">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label for="id_email" class="form-label">E-mail cadastrado</label>
                        <input type="email" name="email" class="form-control" id="id_email" required placeholder="seu@email.com">
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg">Enviar Link de Recuperação</button>
                        <a href="{% url 'login' %}" class="btn btn-outline-secondary">Voltar para Login</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
