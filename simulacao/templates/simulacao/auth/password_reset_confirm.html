{% extends 'simulacao/auth/base_auth.html' %}

{% block title %}Nova Senha - SIMULALAR{% endblock %}

{% block auth_content %}
<div class="auth-card">
    <div class="auth-header">
        <h1>🔐 Criar Nova Senha</h1>
        <p>Digite sua nova senha abaixo</p>
    </div>

    <form method="post" class="auth-form" id="resetForm">
        {% csrf_token %}
        
        <div class="form-group">
            <label for="password">
                <i class="fas fa-lock"></i> Nova Senha
            </label>
            <input 
                type="password" 
                id="password" 
                name="password" 
                placeholder="Mínimo 8 caracteres"
                required
                autofocus
            >
            <div class="password-strength" id="passwordStrength">
                <div class="strength-bar" id="strengthBar"></div>
                <span class="strength-text" id="strengthText"></span>
            </div>
        </div>

        <div class="form-group">
            <label for="password_confirm">
                <i class="fas fa-lock"></i> Confirmar Nova Senha
            </label>
            <input 
                type="password" 
                id="password_confirm" 
                name="password_confirm" 
                placeholder="Digite a senha novamente"
                required
            >
        </div>

        <button type="submit" class="btn-primary">
            <i class="fas fa-check"></i> Alterar Senha
        </button>
    </form>

    <div class="auth-footer">
        <p>
            <a href="{% url 'login' %}">
                <i class="fas fa-arrow-left"></i> Voltar para Login
            </a>
        </p>
    </div>
</div>

<style>
    .password-strength {
        margin-top: 0.5rem;
    }

    .strength-bar {
        height: 4px;
        border-radius: 2px;
        background: rgba(255, 255, 255, 0.2);
        transition: all 0.3s ease;
    }

    .strength-bar.weak {
        width: 33%;
        background: #ff4444;
    }

    .strength-bar.medium {
        width: 66%;
        background: #ffaa00;
    }

    .strength-bar.strong {
        width: 100%;
        background: #00cc66;
    }

    .strength-text {
        display: block;
        margin-top: 0.25rem;
        font-size: 0.85rem;
        color: rgba(255, 255, 255, 0.8);
    }
</style>

<script>
    // Validação de força de senha
    const passwordInput = document.getElementById('password');
    const strengthBar = document.getElementById('strengthBar');
    const strengthText = document.getElementById('strengthText');

    passwordInput.addEventListener('input', function() {
        const password = this.value;
        let strength = 0;

        if (password.length >= 8) strength++;
        if (password.match(/[a-z]/) && password.match(/[A-Z]/)) strength++;
        if (password.match(/[0-9]/)) strength++;
        if (password.match(/[^a-zA-Z0-9]/)) strength++;

        strengthBar.className = 'strength-bar';
        
        if (strength <= 1) {
            strengthBar.classList.add('weak');
            strengthText.textContent = 'Senha fraca';
        } else if (strength <= 2) {
            strengthBar.classList.add('medium');
            strengthText.textContent = 'Senha média';
        } else {
            strengthBar.classList.add('strong');
            strengthText.textContent = 'Senha forte';
        }
    });

    // Validação de confirmação de senha
    document.getElementById('resetForm').addEventListener('submit', function(e) {
        const password = document.getElementById('password').value;
        const passwordConfirm = document.getElementById('password_confirm').value;

        if (password !== passwordConfirm) {
            e.preventDefault();
            alert('As senhas não coincidem!');
        }
    });
</script>
{% endblock %}
