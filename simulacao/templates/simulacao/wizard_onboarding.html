{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bem-vindo - SIMULALAR</title>
    <link rel="stylesheet" href="{% static 'css/custom.css' %}">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        .onboarding-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 40px 30px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            max-width: 400px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .icon { font-size: 64px; margin-bottom: 20px; display: block; }
        h1 { font-size: 32px; margin-bottom: 10px; font-weight: 800; letter-spacing: -0.5px; }
        p { font-size: 17px; margin-bottom: 40px; opacity: 0.9; line-height: 1.6; font-weight: 400; }
        
        .btn-start {
            background: white;
            color: #667eea;
            font-weight: 800;
            padding: 18px 30px;
            border-radius: 50px;
            text-decoration: none;
            display: block;
            width: 100%;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            transition: transform 0.2s, box-shadow 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 14px;
        }
        .btn-start:active { transform: scale(0.98); }
    </style>
</head>
<body>
    <div class="onboarding-card fade-in">
        <span class="icon">🏠</span>
        <h1>SIMULALAR</h1>
        <p>Descubra a melhor forma de conquistar seu imóvel. Compare Financiamento, Consórcio e Investimentos.</p>
        <a href="{% url 'wizard_novo_step' step=1 %}" class="btn-start">Começar Simulação</a>
    </div>
</body>
</html>
